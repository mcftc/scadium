# SAST for the TS surface (#39). Rust static analysis runs as cargo clippy
# (-D warnings) + cargo audit inside ci.yml's anchor-tests job.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1' # weekly sweep so new queries cover old code

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - uses: github/codeql-action/analyze@v3
