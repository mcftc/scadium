name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scadium
          POSTGRES_PASSWORD: scadium
          POSTGRES_DB: scadium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scadium -d scadium"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://scadium:scadium@localhost:5432/scadium?schema=public
      JWT_SECRET: ci-test-secret-not-for-production

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Dependency audit (#39 — warn-only until the backlog is burned down)
        # 26 high + 2 critical pre-existing transitive advisories today (mostly
        # the solana-web3/anchor dependency tree — protobufjs, shell-quote, axios
        # via @coral-xyz). Per the #39 rollout: surface now, flip to blocking
        # (drop continue-on-error) once Dependabot has cleared the backlog.
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

      - name: Bootstrap guard (#16 — dev builds workspace pkgs first + migrate-on-deploy wired)
        run: bash scripts/check-bootstrap.sh

      - name: Prisma migrate
        run: pnpm --filter @scadium/api exec prisma migrate deploy

      - name: Build shared packages
        run: pnpm --filter @scadium/shared --filter @scadium/fair build

      - name: Fair engine tests (incl. Node⇄browser cross-impl parity)
        # parity.test.ts runs the browser WebCrypto engine (apps/web/.../fair-browser.ts)
        # under Node's global WebCrypto and asserts it matches @scadium/fair against
        # the shared golden fixture — a divergence fails the build.
        run: pnpm --filter @scadium/fair test

      - name: API unit tests (#39 — the src/**/*.spec.ts suites were never gated)
        run: pnpm --filter @scadium/api test:unit

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Build web
        run: pnpm --filter @scadium/web build

      - name: Build api
        run: pnpm --filter @scadium/api exec tsc -p tsconfig.json

      - name: Build worker
        run: pnpm --filter @scadium/worker build

  api-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scadium
          POSTGRES_PASSWORD: scadium
          POSTGRES_DB: scadium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scadium -d scadium"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://scadium:scadium@localhost:5432/scadium_test?schema=public
      TEST_DATABASE_URL: postgresql://scadium:scadium@localhost:5432/scadium_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @scadium/shared --filter @scadium/fair build

      - name: Create test database
        run: PGPASSWORD=scadium psql -h localhost -U scadium -d scadium -c 'CREATE DATABASE scadium_test;'

      - name: Prisma migrate (test DB)
        run: pnpm --filter @scadium/api exec prisma migrate deploy

      - name: Integration tests
        # Fork pool + app.close() guarantee the run cannot hang on the engines'
        # background round timers.
        run: pnpm --filter @scadium/api test:integration

  anchor-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Program unit tests — all 3 programs compile + lottery golden lockstep
        # `shared_golden_fixture_lockstep` reads packages/fair/src/__fixtures__/
        # golden.json, so a one-byte divergence between the Rust on-chain
        # `derive_numbers` and the Node/browser engines turns CI red. The
        # workspace run also gates vault/swap compilation.
        run: cargo test --workspace --lib

      - name: Rust SAST — clippy, warnings denied (#39)
        # Anchor macro cfg noise is allowed via [workspace.lints]; everything
        # else is a hard failure.
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Rust dependency audit (#39 — RustSec advisories fail the job)
        uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

      # ---- Anchor build + localnet integration tests (#25 / Phase J) ----
      - name: Install Solana (agave, prebuilt)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v4.0.1/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI (prebuilt release binary)
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL -o "$HOME/.local/bin/anchor" \
            https://github.com/solana-foundation/anchor/releases/download/v1.0.2/anchor-1.0.2-x86_64-unknown-linux-gnu
          chmod +x "$HOME/.local/bin/anchor"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache SBF platform-tools
        uses: actions/cache@v4
        with:
          path: ~/.cache/solana
          key: platform-tools-${{ runner.os }}-agave-4.0.1

      - name: anchor build
        run: anchor build

      - name: IDL drift gate (#25 — committed IDL/types must match the source)
        # The committed target/idl + target/types are the on-chain ABI the
        # setup scripts and tests consume. If a program change regenerates a
        # different IDL, the PR must include it — otherwise CI turns red here.
        run: git diff --exit-code target/idl target/types

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: anchor test (localnet integration — vault/swap/lottery)
        # anchor 1.0 spawns `surfpool` as its default local validator, which CI
        # doesn't ship — run agave's solana-test-validator ourselves and skip
        # anchor's spawn.
        run: |
          solana-keygen new --no-bip39-passphrase -s -o "$HOME/.config/solana/id.json"
          solana-test-validator --reset --quiet &
          for i in $(seq 1 60); do
            solana cluster-version -u http://127.0.0.1:8899 >/dev/null 2>&1 && break
            sleep 1
          done
          solana airdrop 100 -u http://127.0.0.1:8899 "$(solana-keygen pubkey "$HOME/.config/solana/id.json")"
          anchor test --skip-local-validator --provider.cluster localnet

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks-action lists the PR's commits
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # gitleaks scans commit history, not just the tree
      - name: Gitleaks (#39 — a committed secret blocks the merge)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t scadium-api:ci .

      - name: Trivy scan (#39 — WARN-ONLY until the npm backlog is burned down)
        # The image-layer findings are exactly the pnpm-audit backlog (axios/
        # protobufjs/shell-quote via the solana tree) plus dev-deps that ship in
        # the full node_modules (vitest, esbuild's Go binary). Flip to blocking
        # (drop continue-on-error) once Dependabot clears the npm backlog and
        # the runner stage is pruned to prod deps (follow-up).
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scadium-api:ci
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  audit-status:
    # Block real-money cutover while any open Critical/High security finding
    # (auditor/pentester, #51) exists in Phase M. No-op until findings are filed.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v6
      - name: audit-status gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/audit-status-gate.sh

  helm-chart:
    # Validate the production Helm chart (#52): lint + render in the default and
    # external-managed-datastore configs. No cluster needed — catches template/
    # values regressions on every PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint infra/helm/scadium
      - name: helm template (default)
        run: helm template scadium infra/helm/scadium > /dev/null
      - name: helm template (external managed datastores via chart secret)
        run: |
          helm template scadium infra/helm/scadium \
            --set postgres.external.enabled=true \
            --set redis.external.enabled=true \
            --set redis.external.url='rediss://managed-redis:6380' \
            --set secrets.databaseUrl='postgresql://x:y@ext:5432/db' > /dev/null
      - name: helm template (production external secret store)
        run: |
          helm template scadium infra/helm/scadium \
            --set postgres.external.enabled=true \
            --set redis.external.enabled=true \
            --set redis.external.url='rediss://managed-redis:6380' \
            --set secrets.existingSecret=scadium-prod-secrets > /dev/null

  web-e2e:
    # Browser e2e for the web app (#142). Stands up the Playwright harness #42
    # asked for; runs the on-chain copy-gating specs against the production build
    # with `/vault/config` network-mocked (no API/DB needed → deterministic).
    runs-on: ubuntu-latest
    env:
      # Inlined into the build so api-client requests resolve to a known origin
      # the Playwright route mock matches (**/api/v1/vault/config*).
      NEXT_PUBLIC_API_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @scadium/shared --filter @scadium/fair build

      - name: Build web
        run: pnpm --filter @scadium/web build

      - name: Install Playwright browser (chromium)
        run: pnpm --filter @scadium/web exec playwright install --with-deps chromium

      - name: Web e2e — on-chain copy gating
        run: pnpm --filter @scadium/web test:e2e
