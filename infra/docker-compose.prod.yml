# Production demo stack — single VPS, play-money mode.
#   docker compose --env-file infra/.env.prod -f infra/docker-compose.prod.yml up -d --build
#
# Only Caddy publishes ports (80/443). Postgres, Redis, the API and the web app are
# reachable only on the internal compose network. The build context is the repo root
# (`..`) because both Dockerfiles COPY the whole workspace.
services:
  postgres:
    image: postgres:16-alpine
    container_name: scadium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - scadium-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scadium-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - scadium-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: scadium-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      THROTTLE_TTL: ${THROTTLE_TTL}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT}
      # Play-money mode: on-chain vars intentionally omitted.
    healthcheck:
      # 127.0.0.1 (not localhost): the API binds IPv4 0.0.0.0, but `localhost`
      # resolves to IPv6 ::1 in the alpine container → connection refused → the
      # container would sit permanently "unhealthy" (and block dependents) (#81).
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4000/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_SOLANA_NETWORK: ${NEXT_PUBLIC_SOLANA_NETWORK}
        NEXT_PUBLIC_SOLANA_RPC: ${NEXT_PUBLIC_SOLANA_RPC}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
    container_name: scadium-web
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: scadium-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - scadium-caddy-data:/data
      - scadium-caddy-config:/config
    depends_on:
      - web
      - api

volumes:
  scadium-pg-data:
  scadium-redis-data:
  scadium-caddy-data:
  scadium-caddy-config:
