{{- if and .Values.redis.enabled (not .Values.redis.external.enabled) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "scadium.fullname" . }}-redis
  labels: {{- include "scadium.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "scadium.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels: {{- include "scadium.selectorLabels" (dict "ctx" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "scadium.selectorLabels" (dict "ctx" . "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          args: ['redis-server', '--appendonly', 'yes']
          ports:
            - { name: redis, containerPort: 6379 }
          readinessProbe:
            exec: { command: ['redis-cli', 'ping'] }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - { name: data, mountPath: /data }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ['ReadWriteOnce']
        {{- if .Values.redis.storageClass }}
        storageClassName: {{ .Values.redis.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scadium.fullname" . }}-redis
  labels: {{- include "scadium.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector: {{- include "scadium.selectorLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
  ports:
    - { name: redis, port: 6379, targetPort: redis }
{{- end }}
