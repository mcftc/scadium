{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scadium.fullname" . }}-secrets
  labels: {{- include "scadium.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- if .Values.postgres.external.enabled }}
  DATABASE_URL: {{ required "secrets.databaseUrl is required when postgres.external.enabled" .Values.secrets.databaseUrl | quote }}
  {{- else }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgres:5432/%s?schema=public" .Values.postgres.username .Values.secrets.postgresPassword (include "scadium.fullname" .) .Values.postgres.database | quote }}
  {{- end }}
{{- end }}
