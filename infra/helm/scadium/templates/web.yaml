{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scadium.fullname" . }}-web
  labels: {{- include "scadium.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels: {{- include "scadium.selectorLabels" (dict "ctx" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "scadium.selectorLabels" (dict "ctx" . "component" "web") | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "scadium.image" (dict "ctx" . "image" .Values.web.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: {{ .Values.web.port }} }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scadium.fullname" . }}-web
  labels: {{- include "scadium.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "scadium.selectorLabels" (dict "ctx" . "component" "web") | nindent 4 }}
  ports:
    - { name: http, port: {{ .Values.web.port }}, targetPort: http }
{{- end }}
